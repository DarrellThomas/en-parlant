name: Release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # for Arm based macs (M1 and above).
            args: '--target aarch64-apple-darwin --bundles dmg'
          - platform: 'macos-latest' # for Intel based macs.
            args: '--target x86_64-apple-darwin --bundles dmg'
          - platform: 'ubuntu-24.04'
            args: ''
          - platform: 'windows-latest'
            args: '--bundles nsis'
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-0=2.44.0-2 \
            libwebkit2gtk-4.1-dev=2.44.0-2 \
            libjavascriptcoregtk-4.1-0=2.44.0-2 \
            libjavascriptcoregtk-4.1-dev=2.44.0-2 \
            gir1.2-javascriptcoregtk-4.1=2.44.0-2 \
            gir1.2-webkit2-4.1=2.44.0-2 \
            libappindicator3-dev \
            librsvg2-dev \
            libspeechd-dev \
            patchelf

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          # Only install macos targets on macos runners
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: Install app dependencies
        run: pnpm install --frozen-lockfile

      - name: Install espeak-ng (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        run: sudo apt-get install -y espeak-ng

      - name: Install espeak (macOS)
        if: matrix.platform == 'macos-latest' && contains(matrix.args, 'aarch64')
        run: brew install espeak-ng

      - name: Bundle KittenTTS (Linux/macOS ARM)
        if: matrix.platform == 'ubuntu-24.04' || contains(matrix.args, 'aarch64')
        run: |
          python3 -m venv scripts/.venv
          scripts/.venv/bin/pip install --no-cache-dir -r scripts/requirements.txt
          scripts/.venv/bin/python -c "from kittentts import KittenTTS; KittenTTS()"
          mkdir -p scripts/models/hub
          cp -r ~/.cache/huggingface/hub/models--KittenML--kitten-tts-nano-0.1 scripts/models/hub/
          du -sh scripts/.venv scripts/models

      - name: Bundle KittenTTS (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          pip install -r scripts/requirements.txt pyinstaller
          python -c "from kittentts import KittenTTS; KittenTTS()"
          $modelDir = "$env:USERPROFILE\.cache\huggingface\hub\models--KittenML--kitten-tts-nano-0.1"
          pyinstaller --onefile --add-data "${modelDir};models/hub/models--KittenML--kitten-tts-nano-0.1" --name kittentts-server scripts/kittentts-server.py
          Copy-Item dist/kittentts-server.exe scripts/kittentts-server.exe

      - name: Ensure resource stub dirs exist
        shell: bash
        run: mkdir -p scripts/.venv scripts/models

      - name: Install Azure Trusted Signing CLI (Windows)
        if: matrix.platform == 'windows-latest'
        run: cargo install trusted-signing-cli

      - name: Build the app
        uses: tauri-apps/tauri-action@v0

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          VITE_RELAY_URL: ${{ secrets.VITE_RELAY_URL }}
          CI: false
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "v__VERSION__"
          releaseBody: "See the assets to download and install this version."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  checksums:
    needs: release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate and upload SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir assets
          gh release download ${{ github.ref_name }} --repo ${{ github.repository }} --dir assets
          cd assets
          sha256sum $(ls | grep -v 'SHA256SUMS' | grep -v 'latest.json') | sort > SHA256SUMS.txt
          cat SHA256SUMS.txt
          gh release upload ${{ github.ref_name }} SHA256SUMS.txt --repo ${{ github.repository }} --clobber

  publish-updater:
    needs: checksums
    runs-on: ubuntu-latest
    steps:
      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone R2 remote
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${R2_ACCESS_KEY_ID}
          secret_access_key = ${R2_SECRET_ACCESS_KEY}
          endpoint = https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com
          acl = private
          EOF

      - name: Download latest.json from GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --pattern "latest.json" \
            --dir /tmp/updater

      - name: Upload latest.json to R2
        run: |
          rclone copyto /tmp/updater/latest.json r2:enparlant-assets/api/updates/latest.json \
            --header-upload "Content-Type: application/json" \
            --header-upload "Cache-Control: public, max-age=60"
          echo "latest.json published for ${{ github.ref_name }}"

  virustotal:
    needs: checksums
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --pattern "*.exe" \
            --pattern "*.dmg" \
            --pattern "*.deb" \
            --pattern "*.rpm" \
            --pattern "*.AppImage" \
            --dir /tmp/vt
          echo "Files to scan:"
          ls -lh /tmp/vt/

      - name: Scan all artifacts with VirusTotal
        env:
          VT_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: |
          OVERALL_MAX=0

          for FILE in /tmp/vt/*; do
            NAME=$(basename "$FILE")
            SHA256=$(sha256sum "$FILE" | cut -d' ' -f1)
            echo ""
            echo "── $NAME ──"
            echo "  SHA256: $SHA256"

            # Upload
            RESPONSE=$(curl -s --request POST \
              --url https://www.virustotal.com/api/v3/files \
              --header "x-apikey: $VT_API_KEY" \
              --form "file=@$FILE")
            ANALYSIS_ID=$(echo "$RESPONSE" | jq -r '.data.id')
            echo "  Analysis ID: $ANALYSIS_ID"

            # Poll for completion (30s intervals, up to 10 minutes)
            for i in $(seq 1 20); do
              sleep 30
              RESULT=$(curl -s --request GET \
                --url "https://www.virustotal.com/api/v3/analyses/$ANALYSIS_ID" \
                --header "x-apikey: $VT_API_KEY")
              STATUS=$(echo "$RESULT" | jq -r '.data.attributes.status')
              echo "  Attempt $i/20: $STATUS"

              if [ "$STATUS" = "completed" ]; then
                MALICIOUS=$(echo "$RESULT"  | jq -r '.data.attributes.stats.malicious')
                SUSPICIOUS=$(echo "$RESULT" | jq -r '.data.attributes.stats.suspicious')
                UNDETECTED=$(echo "$RESULT" | jq -r '.data.attributes.stats.undetected')
                echo "  Malicious:  $MALICIOUS"
                echo "  Suspicious: $SUSPICIOUS"
                echo "  Undetected: $UNDETECTED"
                echo "  Report:     https://www.virustotal.com/gui/file/$SHA256"

                if [ "$MALICIOUS" -ge 4 ]; then
                  echo "::error::$NAME — $MALICIOUS engines flagged this file!"
                elif [ "$MALICIOUS" -gt 0 ]; then
                  echo "::warning::$NAME — $MALICIOUS engine(s) flagged (likely false positive)"
                else
                  echo "::notice::$NAME — Clean"
                fi

                [ "$MALICIOUS" -gt "$OVERALL_MAX" ] && OVERALL_MAX="$MALICIOUS"
                break
              fi

              if [ "$i" -eq 20 ]; then
                echo "::warning::$NAME — VirusTotal analysis timed out"
              fi
            done
          done

          echo ""
          echo "=== Summary: max malicious detections across all artifacts: $OVERALL_MAX ==="
          [ "$OVERALL_MAX" -ge 4 ] && exit 1 || exit 0
